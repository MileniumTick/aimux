version: 2
project_name: aimux

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  disable: true

homebrew_casks:
  - name: aimux
    repository:
      owner: MileniumTick
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/MileniumTick/aimux"
    description: "AI Provider Multiplexer for dev CLIs"
    url:
      template: "https://github.com/MileniumTick/aimux/releases/download/\
        {{ .Tag }}/{{ .ArtifactName }}"
